name: Manual Sync & Init

on:
  workflow_dispatch:
    inputs:
      reset_readme:
        description: '⚠️ README 파일을 초기화하고 다시 만들까요? (체크 시 기존 내용 삭제됨)'
        required: false
        type: boolean
        default: false

# 깃허브 액션 봇 쓰기 권한 부여
permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      # 1. 저장소 코드 가져오기
      - name: 📦 저장소 체크아웃
        uses: actions/checkout@v6
        
      # 2. 파이썬 환경 세팅
      - name: 🐍 파이썬 환경 설정
        uses: actions/setup-python@v6
        with:
          python-version: '3.x'
          
      # 3. 필수 라이브러리 설치
      - name: 📥 의존성 설치
        run: pip install requests

      # 4. 파이썬 스크립트 실행 (전체 조회 및 README 설정 적용)
      - name: 🚀 노션 동기화 스크립트 실행
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          NOTION_DATABASE_ID: ${{ secrets.NOTION_DATABASE_ID }}
          FETCH_MODE: "ALL"
          RESET_MODE: ${{ inputs.reset_readme }}
        run: python update_readme.py
        
      # 5. 변경된 내용을 깃허브에 반영
      - name: 💾 변경사항 커밋 및 푸시
        run: |
          git config --global user.name "${{ secrets.GIT_USER_NAME || 'GitHub Action' }}"
          git config --global user.email "${{ secrets.GIT_USER_EMAIL || 'action@github.com' }}"
          git add .
          git commit -m "docs: 🔄 수동 동기화 및 마크다운 업데이트" || exit 0
          git push
