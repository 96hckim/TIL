name: Notion to GitHub Sync

on:
  schedule:
    - cron: '0 15 * * *' # 매일 자정(한국 시간 기준)에 자동 실행
  workflow_dispatch: # 수동 테스트를 위한 버튼 활성화

jobs:
  notion-to-github:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Export Notion to Markdown
        uses: dorianb/notion-to-markdown-action@v1
        with:
          notion_api_token: ${{ secrets.NOTION_TOKEN }}
          notion_database_id: ${{ secrets.NOTION_DATABASE_ID }}
          output_dir: 'TIL' 

      - name: Rename files with Date from Notion
        run: |
          shopt -s nullglob
          for file in TIL/*.md; do
            filename=$(basename "$file")
            
            # 파일명이 이미 'YYYY-MM-DD_' 형식으로 시작하는지 확인 (중복 추가 방지)
            if [[ ! $filename =~ ^[0-9]{4}-[0-9]{2}-[0-9]{2}_ ]]; then
              
              # 파일 내용 중 '날짜' 또는 'Date'로 시작하는 줄에서 날짜(YYYY-MM-DD)만 추출
              file_date=$(grep -iE "^(날짜|Date|date):" "$file" | grep -Eo "[0-9]{4}-[0-9]{2}-[0-9]{2}" | head -1)
              
              # 추출된 날짜가 있다면 파일명 앞에 붙여서 변경
              if [[ -n "$file_date" ]]; then
                mv "$file" "TIL/${file_date}_${filename}"
              fi
            fi
          done

      - name: Commit and Push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          git commit -m "docs: 노션 TIL 자동 커밋" || echo "No changes to commit"
          git push
