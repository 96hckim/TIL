name: Notion to GitHub Sync

on:
  schedule:
    - cron: '0 15 * * *'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Install Dependencies
        run: npm install @notionhq/client notion-to-md

      - name: Export Notion to Markdown
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          NOTION_DATABASE_ID: ${{ secrets.NOTION_DATABASE_ID }}
        run: |
          cat << 'EOF' > export.js
          const { Client } = require("@notionhq/client");
          const { NotionToMarkdown } = require("notion-to-md");
          const fs = require("fs");

          const notion = new Client({ auth: process.env.NOTION_TOKEN });
          const n2m = new NotionToMarkdown({ notionClient: notion });

          (async () => {
            const dbId = process.env.NOTION_DATABASE_ID;
            let results = [];
            let cursor = undefined;

            // 페이지가 많아져도 끊기지 않고 전부 가져오도록 설정
            do {
              const response = await notion.databases.query({
                database_id: dbId,
                start_cursor: cursor,
              });
              results = results.concat(response.results);
              cursor = response.next_cursor;
            } while (cursor);

            if (!fs.existsSync("TIL")) fs.mkdirSync("TIL");

            for (const page of results) {
              let title = "Untitled";
              let datePrefix = "";

              // 노션 표의 여러 속성 중에서 '제목'과 '날짜'만 정확히 뽑아내기
              for (const prop of Object.values(page.properties)) {
                if (prop.type === "title" && prop.title.length > 0) {
                  title = prop.title[0].plain_text;
                }
                if (prop.type === "date" && prop.date) {
                  datePrefix = prop.date.start + "_";
                }
              }

              // 마크다운으로 변환
              const mdblocks = await n2m.pageToMarkdown(page.id);
              const mdString = n2m.toMarkdownString(mdblocks);
              const content = typeof mdString === "string" ? mdString : mdString.parent || "";

              // 파일 이름에 특수문자가 있으면 에러가 나므로 하이픈(-)으로 치환
              const safeTitle = title.replace(/[\/\\]/g, "-");
              
              // 최종적으로 '2026-05-20_포인터 기초.md' 형태로 파일 저장
              fs.writeFileSync(`TIL/${datePrefix}${safeTitle}.md`, content);
            }
          })();
          EOF
          node export.js

      - name: Commit and Push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          # 변환된 TIL 폴더만 깔끔하게 깃허브에 올립니다.
          git add TIL/
          git commit -m "docs: 노션 TIL 자동 커밋" || echo "No changes to commit"
          git push
